<input type="text" id="archivo" value="https://198.251.64.144/sada-util/lab-bio-dev/view/analisis/json_files/SQC-920.json" />
<button id="enviar">Enviar</button>
<script>
  function calcularCtrl(fecha = new Date()) {
    const year = fecha.getFullYear();
    const month = fecha.getMonth() + 1; // 1..12
    const day = fecha.getDate();
    return (year * 3) + (month * 5) + (day * 7);
  }

  document.getElementById('enviar').addEventListener('click', async () => {
    //const input = document.getElementById('archivo');
    /*if (!input.files || !input.files[0]) {
      alert('Selecciona un archivo primero.');
      return;
    }
    const file = input.files[0];
    */


    const file = 'https://198.251.64.144/sada-util/lab-bio-dev/view/analisis/json_files/SQC-920.json'
    console.log('file:',file);
    console.log('ctrl:',String(calcularCtrl()));
    
    const form = new FormData();
    form.append('file', file);
    form.append('ctrl', String(calcularCtrl()));


    


    const urlDestino = 'https://mapasdata.com/sada-net/laboratorio/uploadDataLaboJson.aspx'; // <- reemplaza por tu URL
    try {
      const resp = await fetch(urlDestino, {
        method: 'POST',
        body: form
      });
      const contentType = resp.headers.get('content-type') || '';
      const payload = contentType.includes('application/json')
        ? await resp.json()
        : await resp.text();

      console.log('Respuesta:', payload);

      if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}\n${payload}`);
      alert('Envío exitoso. ctrl=' + calcularCtrl());
      console.log('Respuesta:', payload);
    } catch (e) {
      console.error(e);
      alert('Error al enviar: ' + calcularCtrl() + file + payload + e.message);
    }
  });
</script>
