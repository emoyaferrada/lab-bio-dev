name: Análisis de Código PHP Legacy

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Permite ejecución manual

jobs:
  analisis-codigo:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Clonar el repositorio
      - name: Checkout código
        uses: actions/checkout@v4
      
      # 2. Configurar PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'  # Ajusta según tu versión legacy
          tools: composer, phploc, phpcpd, phpdepend, phpmd
          coverage: none
      
      # 3. Instalar dependencias (si tiene composer.json)
      - name: Instalar dependencias PHP
        run: composer install --no-progress --no-suggest --prefer-dist
        continue-on-error: true  # Si no tiene composer
      
      # 4. ANÁLISIS ESTÁTICO CON PHP_MD (Detecta código complejo)
      - name: PHP Mess Detector - Código problemático
        run: |
          phpmd . ansi \
            cleancode,codesize,controversial,design,naming,unusedcode \
            --exclude vendor,tests,cache,logs
        continue-on-error: true
      
      # 5. MEDIDAS DE COMPLEJIDAD
      - name: PHP Loc - Estadísticas de código
        run: |
          phploc . --exclude=vendor --exclude=tests --exclude=cache
        continue-on-error: true
      
      # 6. DETECTAR CÓDIGO DUPLICADO
      - name: PHP Copy/Paste Detector
        run: |
          phpcpd . --exclude=vendor --exclude=tests --min-lines=5 --min-tokens=70
        continue-on-error: true
      
      # 7. ANÁLISIS DE DEPENDENCIAS
      - name: PHP Depend - Métricas de calidad
        run: |
          phpdepend --jdepend-chart=informe/jdepend.svg \
                    --overview-pyramid=informe/pyramid.svg \
                    --summary=informe/summary.txt \
                    . --exclude=vendor
        continue-on-error: true
      
      # 8. VERIFICAR SEGURIDAD (Opcional)
      - name: Análisis de seguridad con Local PHP Security Checker
        run: |
          curl -L https://github.com/fabpot/local-php-security-checker/releases/latest/download/local-php-security-checker_linux_amd64 > security-checker
          chmod +x security-checker
          ./security-checker --path=. --format=json > seguridad.json || true
        continue-on-error: true
      
      # 9. ANÁLISIS PERSONALIZADO PARA LEGACY
      - name: Script personalizado - Análisis Legacy
        run: |
          echo "=== ANÁLISIS DE CÓDIGO LEGACY PHP ==="
          echo ""
          echo "🔍 Buscando archivos sin tipado..."
          grep -r --include="*.php" "function [a-zA-Z0-9_]*(" . | grep -v ":" | wc -l
          
          echo "📁 Detectando includes/requires inseguros..."
          grep -r --include="*.php" "include\s*(\|\require\s*(" . | wc -l
          
          echo "⚠️  Variables globales..."
          grep -r --include="*.php" "global\s*\$" . | wc -l
          
          echo "💀 Posible SQL injection (concatenación)..."
          grep -r --include="*.php" '\$.*=.*".*SELECT.*"\s*\.' . | wc -l
          
          echo "🔧 Funciones largas (+50 líneas)..."
          find . -name "*.php" -exec awk '/function [a-zA-Z0-9_]+\(/,/^}/ {if(NR==FNR){next} count++} END {if(count>50) print FILENAME ": " count " líneas"}' {} \;
        continue-on-error: true
      
      # 10. GENERAR REPORTE RESUMEN
      - name: Generar reporte consolidado
        run: |
          mkdir -p reportes
          echo "# 📊 Reporte de Análisis PHP Legacy" > reportes/README.md
          echo "## Fecha: $(date)" >> reportes/README.md
          echo "" >> reportes/README.md
          echo "### Métricas principales:" >> reportes/README.md
          echo "" >> reportes/README.md
          echo "📈 **Total de archivos PHP:** $(find . -name '*.php' -not -path './vendor/*' -not -path './tests/*' | wc -l)" >> reportes/README.md
          echo "📝 **Líneas de código totales:** $(find . -name '*.php' -not -path './vendor/*' -exec cat {} \; | wc -l)" >> reportes/README.md
          echo "" >> reportes/README.md
          echo "### 📋 Recomendaciones de mejora:" >> reportes/README.md
          echo "- Migrar de include/require a autoloading (PSR-4)" >> reportes/README.md
          echo "- Eliminar variables globales" >> reportes/README.md
          echo "- Usar consultas preparadas contra SQL injection" >> reportes/README.md
          echo "- Dividir funciones/métodos largos en piezas más pequeñas" >> reportes/README.md
          echo "- Implementar tipado estricto (declare(strict_types=1))" >> reportes/README.md
      
      # 11. SUBIR REPORTES COMO ARTEFACTO
      - name: Subir reportes
        uses: actions/upload-artifact@v4
        with:
          name: reportes-analisis-php
          path: |
            reportes/
            informe/
            seguridad.json
          retention-days: 30
